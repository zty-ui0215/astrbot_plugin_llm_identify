name: Validate trusted corpus

on:
  pull_request:
    paths:
      - "schemas/**"
      - "llm_identify/data/trusted_reference_corpus.json"
      - "llm_identify/corpus_validation.py"
      - "llm_identify/contribution/**"
      - "tests/test_corpus_validation_review.py"
      - "tests/test_schema_artifacts.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate corpus and schema artifacts
        run: |
          python -m unittest tests.test_corpus_validation_review tests.test_schema_artifacts
