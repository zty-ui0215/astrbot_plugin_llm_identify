name: Trusted reference candidate
description: Submit a sanitized LLM Identify evidence package from an official provider endpoint.
title: "Trusted reference candidate: "
labels: ["trusted-reference", "intake", "needs-review"]
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - openai
        - anthropic
        - google
    validations:
      required: true
  - type: input
    id: official_host
    attributes:
      label: Official endpoint host
      description: Example: api.openai.com
    validations:
      required: true
  - type: input
    id: model_claim
    attributes:
      label: Model claim
    validations:
      required: true
  - type: textarea
    id: evidence_package
    attributes:
      label: Sanitized evidence package JSON
      description: Paste only the package generated by the plugin. Do not attach raw prompts or completions.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I confirm this submission contains no API keys, bearer tokens, cookies, Authorization headers, raw prompts, or raw completions.
          required: true
        - label: I confirm the endpoint is a first-party provider endpoint, not a third-party gateway.
          required: true
        - label: I understand this candidate requires maintainer review before promotion.
          required: true
