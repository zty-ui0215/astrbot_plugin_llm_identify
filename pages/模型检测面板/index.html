<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Identify</title>
  <link rel="stylesheet" href="./app.css?v=20260709-4" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" data-i18n="eyebrow">LLM IDENTIFY</p>
        <h1 data-i18n="heading">Endpoint Audit</h1>
      </div>
      <div class="topbar-actions">
        <label class="language-control" title="Language">
          <span data-i18n="language">Language</span>
          <select id="languageSelect" aria-label="Language">
            <option value="en-US">English</option>
            <option value="zh-CN">中文</option>
            <option value="ja-JP">日本語</option>
          </select>
        </label>
        <button id="refreshBtn" type="button" data-i18n="refresh">Refresh</button>
      </div>
    </header>

    <section class="summary-grid">
      <article class="metric">
        <span data-i18n="provider">Provider</span>
        <strong id="providerId">unknown</strong>
      </article>
      <article class="metric">
        <span data-i18n="claimed_model">Claimed Model</span>
        <strong id="claimedModel">unknown</strong>
      </article>
      <article class="metric">
        <span data-i18n="family_guess">Family Guess</span>
        <strong id="modelFamily">unknown</strong>
      </article>
      <article class="metric">
        <span data-i18n="state">State</span>
        <strong id="runningState">idle</strong>
      </article>
      <article class="metric">
        <span data-i18n="risk">Risk</span>
        <strong id="riskLevel">none</strong>
      </article>
    </section>

    <section class="workbench">
      <div class="workbench-head">
        <div>
          <h2 data-i18n="run_audit">Run Audit</h2>
          <p data-i18n="run_hint">Quick mode checks protocol behavior. Full mode adds token-accounting and fingerprint evidence.</p>
        </div>
        <button id="detectBtn" type="button" data-i18n="run">Run</button>
      </div>
      <div class="mode-panel">
        <label>
          <span data-i18n="audit_mode">Audit mode</span>
          <select id="detectMode">
            <option value="astrbot" data-i18n="mode_astrbot">AstrBot Provider - Quick</option>
            <option value="astrbot_full" data-i18n="mode_astrbot_full">AstrBot Provider - Full Fingerprint</option>
            <option value="direct_openai" data-i18n="mode_direct">Direct OpenAI-compatible - Full Fingerprint</option>
          </select>
        </label>
        <label id="astrbotProviderField">
          <span data-i18n="astrbot_provider">AstrBot model</span>
          <select id="astrbotProvider"></select>
        </label>
        <div id="directFields" class="direct-fields" hidden>
          <label>
            <span data-i18n="base_url">Base URL</span>
            <input id="directBaseUrl" type="url" placeholder="https://api.openai.com/v1" autocomplete="off" />
          </label>
          <label>
            <span data-i18n="api_key">API Key</span>
            <input id="directApiKey" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
          <label>
            <span data-i18n="model">Model</span>
            <input id="directModel" type="text" placeholder="gpt-4.1-mini" autocomplete="off" />
          </label>
        </div>
      </div>
      <div id="message" class="message" hidden></div>
    </section>

    <section id="reportPanel" class="report-panel" hidden>
      <div class="report-head">
        <div>
          <h2 data-i18n="audit_result">Audit Result</h2>
          <p id="reportTime"></p>
        </div>
        <span id="confidenceBadge" class="badge">none</span>
      </div>

      <div class="conclusion">
        <label data-i18n="primary_findings">Primary Findings</label>
        <strong id="findingsSummary"></strong>
      </div>

      <div id="scoreGrid" class="score-grid"></div>
      <div id="probabilityList" class="candidate-list"></div>
      <div id="probeList" class="probe-list"></div>

      <details class="raw-report">
        <summary data-i18n="text_report">Text report</summary>
        <pre id="rawReport"></pre>
      </details>
    </section>
  </main>

  <script src="./app.js?v=20260709-4"></script>
</body>
</html>
